<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsisTeam - Registro de Asistencia DIBA FBC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="main-header mb-5 text-center">
        <div class="container py-5">
            <h1 class="display-4 fw-bold">AsisTeam</h1>
            <p class="lead mb-0">Club DIBA FBC - Control de Asistencia Inteligente</p>
        </div>
    </header>

    <main class="container flex-grow-1">
        <div class="row">
            <section id="face-section" class="col-md-5 mb-4">
                <div class="card glass-card border-0 shadow-lg">
                    <div class="card-body p-4 text-center">
                        <h3 class="card-title fw-bold mb-4">Acceso Rápido</h3>
                        <div class="video-container mx-auto position-relative mb-4">
                            <video id="video" autoplay muted playsinline></video>
                            <canvas id="canvas" style="display: none;"></canvas>
                        </div>
                        <button id="btn-capturar" class="btn btn-primary btn-lg w-100 btn-capture">
                            <i class="fas fa-camera me-2"></i> Capturar Rostro
                        </button>
                    </div>
                </div>
            </section>

            <section id="registro-asistencia" class="col-md-7 mb-4">
                <div class="card glass-card border-0 shadow-lg h-100">
                    <div class="card-body p-4">
                        <h3 class="fw-bold mb-4"><i class="fas fa-list-check me-2"></i> Asistencias Recientes</h3>
                        <ul id="lista-asistencias" class="list-group list-group-flush custom-list">
                        </ul>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
        <div id="liveToast" class="toast align-items-center border-0 shadow" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2 font-inter" id="toast-body-content"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <footer class="main-footer mt-auto">
        <div class="container py-5">
            <div class="row text-center text-md-start align-items-center">
                <div class="col-md-4 mb-4 mb-md-0">
                    <img src="https://diba-fbc.vercel.app/images/ESCUDO.png" alt="DIBA FBC" style="max-width: 90px;">
                    <p class="mt-2 mb-0 fw-bold">DIBA FBC</p>
                    <p class="mt-0">Barranquilla, Colombia</p>
                </div>
                <div class="col-md-4 text-center">
                    <h5 class="fw-bold mb-3">Redes Sociales</h5>
                    <div class="social-links d-flex justify-content-center">
                        <a href="https://www.facebook.com/profile.php?id=100071991100146" class="social-btn"><i
                                class="fab fa-facebook-f"></i></a>
                        <a href="https://www.instagram.com/dibafbc?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
                                class="social-btn"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <hr class="footer-divider">
            <p class="text-center m-0 copyright-text">© 2024 DIBA FBC. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/cn_v3.js"></script>

    <script>
        if (typeof supabase !== 'undefined') {
            window.supabaseClient = supabase.createClient(
                ASISTEAM_CONFIG.supabaseUrl, 
                ASISTEAM_CONFIG.supabaseKey
            );
            console.log('Cliente Supabase inicializado bajo window.supabaseClient');
        } else {
            console.error('La librería Supabase no se cargó.');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/fp_v3.js"></script>
</body>
</html>
