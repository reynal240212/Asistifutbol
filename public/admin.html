<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AsisTeam Admin - Registro de Rostros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-light d-flex flex-column min-vh-100">
    <header class="main-header mb-5 text-center text-white bg-dark py-4">
        <h1 class="display-5 fw-bold">AsisTeam Admin</h1>
        <a href="index.html" class="btn btn-outline-light btn-sm">Volver</a>
    </header>

    <main class="container flex-grow-1">
        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm p-3 text-center">
                    <h4 class="mb-4">1. Escanear</h4>
                    <video id="video-admin" autoplay muted playsinline style="width:100%; border-radius:12px;"></video>
                    <canvas id="canvas-admin" style="display:none;"></canvas>
                    <button id="btn-escanear" class="btn btn-warning w-100 mt-3">Capturar</button>
                </div>
            </div>
            <div class="col-md-7 mb-4">
                <div class="card shadow-sm p-4">
                    <h4 class="mb-4">2. Vincular</h4>
                    <select id="select-jugador" class="form-select form-select-lg mb-3" disabled>
                        <option>Cargando...</option>
                    </select>
                    <button id="btn-vincular" class="btn btn-primary w-100" disabled>Vincular</button>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-primary border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-body-content"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js?v=4"></script>
    <script>
        if (typeof supabase !== 'undefined') {
            window.supabaseClient = supabase.createClient(ASISTEAM_CONFIG.supabaseUrl, ASISTEAM_CONFIG.supabaseKey);
        }
    </script>
    <script src="js/admin.js?v=4"></script>
</body>
</html>
