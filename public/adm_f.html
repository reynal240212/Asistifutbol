<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AsisTeam Admin - Registro de Rostros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="main-header mb-5 text-center">
        <div class="container py-4">
            <h1 class="display-5 fw-bold"><i class="fas fa-users-cog me-2"></i> AsisTeam Admin</h1>
            <p class="lead mb-0 text-white-50">Registro de Rostros para Jugadores</p>
            <a href="idx_f.html" class="btn btn-outline-light mt-3 btn-sm"><i class="fas fa-arrow-left me-1"></i> Volver a Toma</a>
        </div>
    </header>

    <main class="container flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <div class="card glass-card border-0 shadow-lg h-100">
                    <div class="card-body p-4 text-center">
                        <h4 class="card-title fw-bold mb-4">1. Escanear Rostro</h4>
                        <div class="video-container mx-auto position-relative mb-4">
                            <video id="video-admin" autoplay muted playsinline></video>
                            <canvas id="canvas-admin" style="display: none;"></canvas>
                        </div>
                        <button id="btn-escanear" class="btn btn-warning btn-lg w-100 btn-capture text-dark shadow-sm">
                            <i class="fas fa-camera-retro me-2"></i> Capturar Rostro
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-7 mb-4">
                <div class="card glass-card border-0 shadow-lg h-100">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-4">2. Vincular a Jugador</h4>
                        <div class="mb-3">
                            <select id="select-jugador" class="form-select form-select-lg mb-3" disabled>
                                <option value="" selected>Cargando registros...</option>
                            </select>
                            <button id="btn-vincular" class="btn btn-primary w-100 py-3 fw-bold" disabled>
                                <i class="fas fa-link me-2"></i> Vincular Rostro Seleccionado
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
        <div id="liveToast" class="toast align-items-center border-0 shadow" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2 font-inter" id="toast-body-content"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cn_v3.js"></script>
    <script>
        if (typeof supabase !== 'undefined') {
            window.supabaseClient = supabase.createClient(
                ASISTEAM_CONFIG.supabaseUrl, 
                ASISTEAM_CONFIG.supabaseKey
            );
        }
    </script>
    <script src="js/ad_v3.js"></script>
</body>
</html>
