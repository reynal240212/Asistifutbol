<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AsisTeam - Registro de Asistencia DIBA FBC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="main-header mb-5 text-center">
        <div class="container py-5">
            <h1 class="display-4 fw-bold">AsisTeam</h1>
            <p class="lead mb-0">Club DIBA FBC - Control de Asistencia Inteligente</p>
        </div>
    </header>

    <main class="container flex-grow-1">
        <div class="row">
            <section id="face-section" class="col-md-5 mb-4">
                <div class="card glass-card border-0 shadow-lg p-3 text-center">
                    <h3 class="fw-bold mb-4">Acceso Rápido</h3>
                    <div class="video-container mx-auto position-relative mb-4">
                        <video id="video" autoplay muted playsinline style="width: 100%; border-radius: 12px;"></video>
                        <canvas id="canvas" style="display: none;"></canvas>
                    </div>
                    <button id="btn-capturar" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-camera me-2"></i> Capturar Rostro
                    </button>
                </div>
            </section>

            <section id="registro-asistencia" class="col-md-7 mb-4">
                <div class="card glass-card border-0 shadow-lg h-100 p-3">
                    <h3 class="fw-bold mb-4"><i class="fas fa-list-check me-2"></i> Asistencias Recientes</h3>
                    <ul id="lista-asistencias" class="list-group list-group-flush"></ul>
                </div>
            </section>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-primary border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-body-content"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js?v=4"></script>
    <script>
        if (typeof supabase !== 'undefined') {
            window.supabaseClient = supabase.createClient(ASISTEAM_CONFIG.supabaseUrl, ASISTEAM_CONFIG.supabaseKey);
        }
    </script>
    <script src="js/faceplusplus.js?v=4"></script>
</body>
</html>
